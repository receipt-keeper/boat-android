name: Distribute (Firebase App Distribution)

# 수동 실행 전용 — Actions 탭에서 "Run workflow" 클릭 시 배포
on:
  workflow_dispatch:
    inputs:
      releaseNotes:
        description: '릴리스 노트 (테스터에게 표시됨)'
        required: false
        default: '새 테스트 빌드'

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle 설정 (캐시 포함)
        uses: gradle/actions/setup-gradle@v4

      - name: keystore 복원
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > boat-release.jks

      - name: 설정 파일 생성 (서명/시크릿)
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          VISION_API_KEY: ${{ secrets.VISION_API_KEY }}
          SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          cat > keystore.properties <<EOF
          storeFile=boat-release.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          echo "VISION_API_KEY=$VISION_API_KEY" > local.properties
          echo "$SERVICE_ACCOUNT" > firebase-service-account.json

      - name: release 빌드 & App Distribution 업로드
        env:
          # Firebase 플러그인이 사용할 서비스 계정 자격증명 (ADC)
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-service-account.json
          RELEASE_NOTES: ${{ github.event.inputs.releaseNotes }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease appDistributionUploadRelease --releaseNotes "$RELEASE_NOTES"
