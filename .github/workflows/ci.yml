name: CI

# PR 생성/갱신 시 + main 푸시 시 자동 검증
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 같은 PR에서 새 푸시가 오면 이전 실행 취소 (CI 시간 절약)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: 빌드 & 테스트
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle 설정 (캐시 포함)
        uses: gradle/actions/setup-gradle@v4

      - name: debug 빌드 (컴파일 검증)
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace

      - name: 단위 테스트
        run: ./gradlew testDebugUnitTest --stacktrace
